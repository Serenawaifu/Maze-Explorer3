kind = "web"
previewPath = "/"
title = "Maze Game"
version = "1.0.0"
id = "artifacts/maze-game"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20143
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/maze-game run dev"

[services.env]
PORT = "20143"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/maze-game", "run", "build"]
publicDir = "artifacts/maze-game/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
